name: FraudGuard Model Training

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why retraining was triggered"
        required: false
        default: "manual"
      alert:
        description: "Alert name"
        required: false
        default: "none"

  schedule:
    - cron: "0 2 * * 0"   # Har Sunday 2am UTC

jobs:
  train:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/akashagalaveaaa1/fraudguard-ai.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      COOLDOWN_HOURS: 24
      COOLDOWN_S3_PATH: s3://fraudguard-raw-data/meta/last_retrain.txt

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Log retrain context
        run: |
          echo "Retraining trigger reason : ${{ github.event.inputs.reason }}"
          echo "Alert                     : ${{ github.event.inputs.alert }}"
          echo "Event type                : ${{ github.event_name }}"


      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install dvc[s3] mlflow dagshub

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Fetch external data
        run: |
          aws s3 cp s3://fraudguard-raw-data/data/external/ data/external/ --recursive

      - name: DVC Pull
        run: dvc pull

      # ── 7. Drift detection ─────────────────────────────────────────────────
      # Drift mili → retrain.flag 
      # No drift + not scheduled → skip
      - name: Detect data drift
        run: |
          python scripts/drift_detector.py

          if [ -f retrain.flag ]; then
            echo "Drift detected — retraining allowed"
          else
            if [ "${{ github.event_name }}" = "schedule" ]; then
              echo "Scheduled retrain — proceeding anyway"
            else
              echo "No drift and not scheduled — skipping retrain"
              exit 0
            fi
          fi


      - name: Retrain cooldown check
        run: |
          if aws s3 cp $COOLDOWN_S3_PATH /tmp/last_retrain 2>/dev/null; then
            LAST_RUN=$(cat /tmp/last_retrain)
            NOW=$(date +%s)
            DIFF_HOURS=$(( (NOW - LAST_RUN) / 3600 ))

            if [ "$DIFF_HOURS" -lt "$COOLDOWN_HOURS" ]; then
              echo "Cooldown active — ${DIFF_HOURS}h < ${COOLDOWN_HOURS}h — skipping"
              exit 0
            fi

            echo "Cooldown passed — ${DIFF_HOURS}h since last retrain"
          else
            echo "No previous retrain record found — proceeding"
          fi

          # Update timestamp in S3
          date +%s | aws s3 cp - $COOLDOWN_S3_PATH
          echo "Cooldown timestamp updated in S3"

      - name: Retrain model
        run: |
          echo "Starting model retraining via DVC pipeline"
          dvc repro


      - name: Evaluate model
        run: python src/model/model_evaluation.py

      - name: Register model to MLflow Staging
        run: python src/model/model_registry.py

      - name: Push artifacts to DVC remote
        run: dvc push

      # ── 12. Trigger CI-CD ──────────────────────────────────────────────────
      # Train complete → cicd.yaml automatically trigger 
      # workflow_run trigger — quality check → promote → deploy
      - name: Done
        run: |
          echo "Model training complete"
          echo "cicd.yaml will now run model_quality_check → promote → deploy"