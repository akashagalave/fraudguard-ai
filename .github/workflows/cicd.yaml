name: FraudGuard CI-CD Pipeline

on:
  # Model training complete  → automatically trigger
  workflow_run:
    workflows: ["FraudGuard Model Training"]
    types:
      - completed


  push:
    branches: [main]
    paths:
      - "serving/**"
      - "src/**"

  
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 199964507152.dkr.ecr.us-east-1.amazonaws.com
  CLUSTER_NAME: fraudguard-eks
  NAMESPACE: fraudguard
  MLFLOW_TRACKING_URI: https://dagshub.com/akashagalaveaaa1/fraudguard-ai.mlflow
  MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_TOKEN }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
  DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

jobs:
  deploy:
    # Only run if triggered manually, on push, or after a successful training run
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:

  
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install mlflow dagshub dvc[s3]

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

   
      - name: DVC Pull Artifacts
        run: dvc pull

      # Model quality gate
      # ROC-AUC < 0.9 ya PR-AUC < 0.9 → pipeline fail → no deploy
      - name: Validate Model Quality
        run: python scripts/model_quality_check.py


      - name: Promote Model to Production
        run: python scripts/promote_model.py

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build & Push FastAPI only ───────────────────────────────────────

      - name: Build & Push FastAPI
        run: |
          docker build \
            -f serving/Dockerfile \
            -t $ECR_REGISTRY/fraudguard-fastapi:${{ github.sha }} \
            -t $ECR_REGISTRY/fraudguard-fastapi:latest \
            .
          docker push $ECR_REGISTRY/fraudguard-fastapi:${{ github.sha }}
          docker push $ECR_REGISTRY/fraudguard-fastapi:latest

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Deploy Redis
        run: kubectl apply -f infrastructure/kubernetes/redis/redis.yaml -n $NAMESPACE

      - name: Deploy Kafka
        run: |
          kubectl apply -f infrastructure/kubernetes/kafka/kafka-nodepool.yaml -n $NAMESPACE
          kubectl apply -f infrastructure/kubernetes/kafka/kafka-cluster.yaml  -n $NAMESPACE
          kubectl apply -f infrastructure/kubernetes/kafka/kafka-topic.yaml    -n $NAMESPACE
          kubectl apply -f infrastructure/kubernetes/kafka/kafka-topic-alerts.yaml -n $NAMESPACE

      - name: Deploy FastAPI
        run: |
          kubectl apply -f infrastructure/kubernetes/fastapi/deployment.yaml
          kubectl apply -f infrastructure/kubernetes/fastapi/service.yaml
          kubectl apply -f infrastructure/kubernetes/ingress/fraudguard-ingress.yaml
          kubectl rollout status deployment/fraudguard-fastapi \
            -n $NAMESPACE --timeout=120s

      - name: Apply HPA
        run: kubectl apply -f infrastructure/kubernetes/hpa/fraudguard-hpa.yaml

      - name: Deploy Consumer (updated inference code)
        run: |
          TAG=${{ github.sha }}
          kubectl set image deployment/fraudguard-consumer \
            consumer=$ECR_REGISTRY/fraudguard-consumer:$TAG \
            -n $NAMESPACE
          kubectl rollout status deployment/fraudguard-consumer -n $NAMESPACE --timeout=120s

      - name: Apply Monitoring
        run: |
          kubectl apply -f infrastructure/kubernetes/monitoring/fraudguard-fastapi-servicemonitor.yaml
          kubectl apply -f infrastructure/kubernetes/monitoring/fraudguard-accuracy-alert.yaml

  
      - name: Apply Prometheus Adapter
        run: |
          helm upgrade --install prometheus-adapter \
            prometheus-community/prometheus-adapter \
            --namespace monitoring \
            -f infrastructure/kubernetes/prometheus-adapter/adapter-values.yaml \
            --wait


      - name: Verify deployments
        run: |
          kubectl rollout status deployment/fraudguard-fastapi -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/redis              -n $NAMESPACE --timeout=60s
          echo "All deployments healthy"
