apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fraudguard-recording-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: fraudguard-latency
      rules:
        # FIXED: correct metric name is fraud_model_inference_latency_seconds
        # (was wrongly referencing fraud_inference_latency_seconds_bucket which doesn't exist)
        - record: fraud_latency_p95
          expr: |
            histogram_quantile(
              0.95,
              sum by (le, namespace, pod) (
                rate(
                  fraud_model_inference_latency_seconds_bucket{namespace="fraudguard"}[5m]
                )
              )
            )

        # Added P99 recording rule (needed for resume claim "P99 < 32ms")
        - record: fraud_latency_p99
          expr: |
            histogram_quantile(
              0.99,
              sum by (le, namespace, pod) (
                rate(
                  fraud_model_inference_latency_seconds_bucket{namespace="fraudguard"}[5m]
                )
              )
            )

        # End-to-end application latency P95 (FastAPI middleware metric)
        - record: fraudguard:app_latency_p95
          expr: |
            histogram_quantile(
              0.95,
              sum by (le, namespace, pod) (
                rate(
                  http_request_latency_seconds_bucket{
                    namespace="fraudguard",
                    path="/predict"
                  }[5m]
                )
              )
            )

        # End-to-end application latency P99
        - record: fraudguard:app_latency_p99
          expr: |
            histogram_quantile(
              0.99,
              sum by (le, namespace, pod) (
                rate(
                  http_request_latency_seconds_bucket{
                    namespace="fraudguard",
                    path="/predict"
                  }[5m]
                )
              )
            )

    - name: fraudguard-model-metrics
      rules:
        # Model accuracy proxy: fraud correct predictions / total predictions
        # Note: requires fraud_correct_predictions_total counter to be emitted by app.py
        # Currently approximated via prediction distribution monitoring
        - record: fraudguard:model_accuracy
          expr: |
            sum(rate(fraud_correct_predictions_total[5m]))
            /
            sum(rate(fraud_predictions_total[5m]))

        # Fraud detection rate: what % of predictions are fraud
        - record: fraudguard:fraud_rate
          expr: |
            sum(rate(fraud_positive_predictions_total[5m]))
            /
            (sum(rate(fraud_predictions_total[5m])) + 1e-10)

        # Request rate per second
        - record: fraudguard:request_rate
          expr: |
            sum(rate(http_requests_total{namespace="fraudguard", path="/predict"}[1m]))
